<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة دارك FM - تطبيق الأخبار العاجلة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            color: white;
            touch-action: manipulation;
        }

        /* حاوية التصميم - مرنة للهواتف */
        #canvas-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px 0;
        }

        #news-canvas {
            width: 400px;
            height: 500px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #334155, #0f172a);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            flex-shrink: 0;
            transform-origin: center;
            border-radius: 8px;
        }

        .gradient-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 75%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            z-index: 1;
        }

        .urgent-tag {
            background: #e11d48;
            color: white;
            padding: 6px 20px;
            font-weight: 900;
            display: inline-block;
            clip-path: polygon(0 0, 90% 0, 100% 100%, 10% 100%);
        }

        #bg-preview {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
        }

        .content-area {
            position: absolute;
            left: 20px; right: 20px; z-index: 2;
        }

        .content-image-mode { bottom: 35px; top: auto; }
        
        .content-text-mode {
            top: 50%; transform: translateY(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border-right: 5px solid #e11d48;
        }

        /* نافذة المعاينة للحفظ في أندرويد */
        #mobile-save-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #result-img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(225, 29, 72, 0.5);
        }

        .control-card {
            background: #1e293b;
            border-radius: 24px;
            border: 1px solid #334155;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto space-y-6">
        
        <!-- الهيدر -->
        <div class="flex justify-between items-center px-2">
            <div>
                <h1 class="text-xl font-black text-white">راديو دارك</h1>
                <p class="text-xs text-red-500 font-bold">تطبيق صناعة المحتوى</p>
            </div>
            <div class="bg-red-600/10 p-2 rounded-full">
                <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
            </div>
        </div>

        <!-- المعاينة -->
        <div id="canvas-wrapper">
            <div id="news-canvas">
                <img id="bg-preview" src="" style="display: none;">
                <div id="gradient-overlay" class="gradient-overlay" style="display: none;"></div>

                <div class="absolute top-5 right-5 z-10">
                    <div class="bg-black/80 px-3 py-1 rounded-lg border border-gray-700">
                        <span class="text-white font-black text-sm">إذاعة دارك</span>
                        <span class="text-red-500 font-bold text-[9px] block text-left">94.3 FM</span>
                    </div>
                </div>

                <div id="content-container" class="content-area content-text-mode">
                    <div class="urgent-tag mb-3 text-base">خبر عاجل</div>
                    <div id="display-title" class="text-red-500 font-black text-xs mb-1">الآن مباشرة</div>
                    <div id="display-text" class="font-bold leading-tight text-white mb-4" style="font-size: 22px;">
                        اكتب تفاصيل الخبر هنا ليظهر على شاشة راديو دارك...
                    </div>
                    <div class="flex justify-between items-center border-t border-red-600/30 pt-3">
                        <div id="display-date" class="text-gray-400 text-[10px] font-bold"></div>
                        <div class="h-1 w-10 bg-red-600 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- أدوات التحكم -->
        <div class="control-card p-6 space-y-5 shadow-2xl">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest">خلفية الخبر</label>
                <div class="flex gap-2">
                    <label class="flex-1 bg-gray-800 border-2 border-dashed border-gray-700 rounded-xl p-3 flex items-center justify-center cursor-pointer active:bg-gray-700">
                        <span class="text-xs text-gray-300">إضافة صورة</span>
                        <input type="file" id="image-input" accept="image/*" class="hidden">
                    </label>
                    <button id="remove-image-btn" class="bg-red-900/20 text-red-500 p-3 rounded-xl border border-red-900/30">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">محتوى الخبر</label>
                <textarea id="text-input" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white font-bold text-sm focus:border-red-600 outline-none" placeholder="ادخل تفاصيل الخبر..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2">العنوان</label>
                    <input type="text" id="title-input" value="الآن مباشرة" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white text-sm font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2">حجم النص</label>
                    <input type="range" id="font-size-slider" min="18" max="35" value="22" class="w-full h-8 accent-red-600">
                </div>
            </div>

            <button id="download-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                <span>حفظ الخبر</span>
            </button>
        </div>
    </div>

    <!-- نافذة الحفظ للأندرويد -->
    <div id="mobile-save-modal">
        <div class="text-center mb-4">
            <h3 class="text-lg font-black text-white">جاهز للحفظ!</h3>
            <p class="text-xs text-gray-400">اضغط مطولاً على الصورة ثم اختر "حفظ الصورة"</p>
        </div>
        <img id="result-img" src="" alt="الخبر الناتج">
        <button onclick="closeModal()" class="mt-6 bg-white/10 text-white px-8 py-3 rounded-full font-bold">إغلاق</button>
    </div>

    <script>
        const canvas = document.getElementById('news-canvas');
        const textInput = document.getElementById('text-input');
        const titleInput = document.getElementById('title-input');
        const imageInput = document.getElementById('image-input');
        const removeImageBtn = document.getElementById('remove-image-btn');
        const fontSizeSlider = document.getElementById('font-size-slider');
        const displayText = document.getElementById('display-text');
        const displayTitle = document.getElementById('display-title');
        const displayDate = document.getElementById('display-date');
        const bgPreview = document.getElementById('bg-preview');
        const gradientOverlay = document.getElementById('gradient-overlay');
        const contentContainer = document.getElementById('content-container');
        const downloadBtn = document.getElementById('download-btn');
        const saveModal = document.getElementById('mobile-save-modal');
        const resultImg = document.getElementById('result-img');

        // تحديث التاريخ
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        displayDate.innerText = new Date().toLocaleDateString('ar-EG', options);

        // التحكم الذكي في الحجم (Responsive scaling)
        function rescaleCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const scale = Math.min(wrapper.clientWidth / 400, 1);
            canvas.style.transform = `scale(${scale})`;
            wrapper.style.height = (500 * scale) + "px";
        }
        window.addEventListener('resize', rescaleCanvas);
        rescaleCanvas();

        // التفاعلات
        textInput.oninput = (e) => displayText.innerText = e.target.value || 'اكتب تفاصيل الخبر...';
        titleInput.oninput = (e) => displayTitle.innerText = e.target.value;
        fontSizeSlider.oninput = (e) => displayText.style.fontSize = e.target.value + 'px';

        imageInput.onchange = function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    bgPreview.src = e.target.result;
                    bgPreview.style.display = 'block';
                    gradientOverlay.style.display = 'block';
                    contentContainer.classList.remove('content-text-mode');
                    contentContainer.classList.add('content-image-mode');
                };
                reader.readAsDataURL(file);
            }
        };

        removeImageBtn.onclick = () => {
            bgPreview.style.display = 'none';
            gradientOverlay.style.display = 'none';
            contentContainer.classList.add('content-text-mode');
            contentContainer.classList.remove('content-image-mode');
            imageInput.value = '';
        };

        function closeModal() {
            saveModal.style.display = 'none';
        }

        // ميزة الحفظ الاحترافية للهاتف
        downloadBtn.onclick = async () => {
            downloadBtn.innerText = 'جاري المعالجة...';
            downloadBtn.disabled = true;

            // انتظار تحميل الخطوط لضمان دقة الصورة
            await document.fonts.ready;

            html2canvas(canvas, {
                useCORS: true,
                scale: 3, // دقة عالية جداً
                backgroundColor: '#0f172a',
                logging: false,
                onclone: (clonedDoc) => {
                    // التأكد من أن الصورة المستنسخة ليست مصغرة بالـ transform
                    const clonedCanvas = clonedDoc.getElementById('news-canvas');
                    clonedCanvas.style.transform = 'none';
                }
            }).then(canvasResult => {
                const dataUrl = canvasResult.toDataURL('image/png');
                
                // إظهار النافذة المنبثقة للحفظ اليدوي (أفضل حل للأندرويد)
                resultImg.src = dataUrl;
                saveModal.style.display = 'flex';

                // محاولة التحميل التلقائي أيضاً
                const link = document.createElement('a');
                link.download = `DarkFM_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();

                downloadBtn.innerText = 'حفظ الخبر';
                downloadBtn.disabled = false;
            }).catch(err => {
                console.error(err);
                downloadBtn.innerText = 'خطأ! حاول مرة أخرى';
                downloadBtn.disabled = false;
            });
        };
    </script>
</body>
</html>
